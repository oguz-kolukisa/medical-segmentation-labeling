# Kuzey overlay on top of upstream CVAT's docker-compose.yml +
# components/serverless/docker-compose.serverless.yml.
#
# Adds:
#   - host-port mapping for CVAT UI via $CVAT_HOST_PORT
#   - mount of ./serverless and ./models into nuclio so nuctl can deploy
#   - gpu/cpu profiles that toggle NVIDIA device reservation
services:
  traefik:
    # Upstream pins traefik:v2.10 whose vendored Docker client uses API 1.24.
    # Docker Engine 25+ rejects that with "Minimum supported API version is
    # 1.40", so traefik can't discover CVAT's routers. Bumping to v2.11 is a
    # drop-in that ships a modern docker client while keeping v2 label syntax.
    image: traefik:v2.11
    environment:
      # Trust X-Forwarded-* headers on the `web` entrypoint. Without this,
      # Traefik overwrites cloudflared's `X-Forwarded-Proto: https` with `http`
      # (because Traefik itself speaks HTTP on :8080), and Django then thinks
      # the request is plain HTTP. That mismatch with the browser's HTTPS
      # origin triggers intermittent CSRF failures — most visible on MedSAM2
      # (AI assist fires many POSTs per interaction). Safe here because :8080
      # on the host is reached only by cloudflared / the local network.
      TRAEFIK_ENTRYPOINTS_web_FORWARDEDHEADERS_INSECURE: "true"
    # !override fully replaces upstream's ports list. Upstream publishes
    # 8080:8080 and 8090:8090; we flatten that to a single UI mapping so the
    # user can pick any free host port without clashing.
    ports: !override
      - "${CVAT_HOST_PORT:-8080}:8080"

  # Accept any Host header on the CVAT routers. Upstream pins them to
  # Host(`${CVAT_HOST}`), which 404s when reached via a Cloudflare Tunnel
  # (`*.trycloudflare.com`), dynamic DNS, or a reverse proxy rewriting Host.
  # Compose appends our label list to upstream's; Docker keeps the last
  # definition of a duplicate key, so these entries win.
  cvat_server:
    labels:
      - traefik.http.routers.cvat.rule=HostRegexp(`{any:.+}`) &&
        PathPrefix(`/api/`, `/static/`, `/admin`, `/documentation/`, `/django-rq`)

  cvat_ui:
    labels:
      - traefik.http.routers.cvat-ui.rule=HostRegexp(`{any:.+}`)

  nuclio:
    volumes:
      - ./serverless:/opt/nuclio/functions:ro
      - ./models:/opt/nuclio/models:ro
    environment:
      KUZEY_DEVICE: "${DEVICE:-cpu}"
